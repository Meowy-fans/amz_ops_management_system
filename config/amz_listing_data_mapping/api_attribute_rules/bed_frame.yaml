attributes:
  item_name:
    level: required
    shape: list_value
    transform: text
    sources:
    - path: content.title
  bullet_point:
    level: required
    shape: list_value
    transform: passthrough
    sources:
    - path: content.bullets
  product_description:
    level: required
    shape: list_value
    transform: text_join
    sources:
    - path: content.description
    - path: product.description
    - path: content.bullets
      confidence: high
      evidence: Compose required description from listing bullets when no persisted
        description exists.
  brand:
    level: required
    shape: list_value
    transform: text
    sources:
    - default: Generic
      confidence: medium
      evidence: Fallback brand for unbranded Giga products.
      safe_default: true
  manufacturer:
    level: recommended
    shape: list_value
    transform: text
    sources:
    - default: Nova Home Essentials
      confidence: medium
      evidence: Existing production default manufacturer for Giga-sourced products.
      safe_default: true
  target_audience_base:
    level: recommended
    shape: list_value
    transform: text
    sources:
    - default: Homeowners
      confidence: medium
      evidence: Default target audience for home and furniture products.
      safe_default: true
  item_type_keyword:
    level: recommended
    shape: list_value
    transform: text
    sources:
    - path: content.title
  item_type_name:
    level: recommended
    shape: list_value
    transform: text
    sources:
    - path: content.title
  country_of_origin:
    level: required
    shape: list_value
    transform: enum
    sources:
    - path: product.attributes.place_of_origin
    - default: CN
      confidence: medium
      evidence: Fallback country for Giga products when place_of_origin is missing.
      safe_default: true
  supplier_declared_dg_hz_regulation:
    level: required
    shape: list_value
    transform: text
    sources:
    - default: not_applicable
      confidence: medium
      evidence: Default for non-hazardous goods; review per category for battery or
        hazmat risk.
      safe_default: true
  externally_assigned_product_identifier:
    level: required
    shape: object
    transform: passthrough
    sources:
    - default:
        type: GTIN_EXEMPTION
        value: product_does_not_have_gtin
      confidence: medium
      evidence: Existing GTIN exemption behavior for listings without supplier product
        identifiers.
      safe_default: true
  supplier_declared_has_product_identifier_exemption:
    level: required
    shape: list_value
    transform: boolean_yes_no
    sources:
    - default: true
      confidence: medium
      evidence: Existing product identifier exemption declaration for GTIN-exempt
        listings.
      safe_default: true
  fabric_type:
    shape: array_object
    level: required
    transform: passthrough
    manual_review: true
    required_children:
    - value
    children:
      value:
        shape: value
        transform: text
        sources:
        - path: product.attributes.Fabric Type
          confidence: high
          evidence: Bootstrap mapping for fabric_type.value
        - path: product.attributes.Main Material
          confidence: high
          evidence: Bootstrap mapping for fabric_type.value
  model_number:
    shape: array_object
    level: required
    transform: passthrough
    manual_review: true
    required_children:
    - value
    children:
      value:
        shape: value
        transform: text
        sources:
        - path: product.attributes.Model Number
          confidence: high
          evidence: Bootstrap mapping for model_number.value
        - path: product.attributes.mpn
          confidence: high
          evidence: Bootstrap mapping for model_number.value
        - path: product.vendor_sku
          confidence: high
          evidence: Bootstrap mapping for model_number.value
  finish_type:
    shape: array_object
    level: required
    transform: passthrough
    manual_review: true
    required_children:
    - value
    children:
      value:
        shape: value
        transform: text
        sources:
        - path: product.attributes.Finish Type
          confidence: high
        - path: product.attributes.Finish
          confidence: medium
        - default: Unfinished
          confidence: medium
          evidence: BED_FRAME finish fallback when supplier finish is missing.
          safe_default: true
  is_assembly_required:
    shape: array_object
    level: required
    transform: passthrough
    manual_review: true
    enum_values:
    - 'False'
    - 'True'
    required_children:
    - value
    children:
      value:
        shape: value
        enum_values:
        - 'False'
        - 'True'
        transform: enum
        sources:
        - path: product.attributes.Assembly Required
