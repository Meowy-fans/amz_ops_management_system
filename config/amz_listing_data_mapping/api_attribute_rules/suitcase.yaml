product_type: SUITCASE
version: suitcase_attribute_rules_draft_v1
mode: dry_run
generated_from: amazon_product_type_schema
presets:
- amazon_universal_required_v1
attributes:
  department:
    level: required
    shape: list_value
    transform: text
    manual_review: true
    sources:
    - llm:
        hint: Extract department from the product title, description, bullet points,
          and supplier characteristics. Return null if the information is not found.
    - default: null
      confidence: low
      evidence: 'TODO: review safe default for department'
  item_length_width_height:
    level: required
    shape: object
    transform: passthrough
    manual_review: true
    sources:
    - default: null
      confidence: low
      evidence: 'TODO: review source mapping for item_length_width_height'
  shell_type:
    level: required
    shape: list_value
    transform: text
    manual_review: true
    sources:
    - llm:
        hint: Extract shell type from the product title, description, bullet points,
          and supplier characteristics. Return null if the information is not found.
    - default: null
      confidence: low
      evidence: 'TODO: review safe default for shell_type'
  style:
    level: required
    shape: list_value
    transform: text
    manual_review: true
    sources:
    - llm:
        hint: Extract style from the product title, description, bullet points, and
          supplier characteristics. Return null if the information is not found.
    - default: null
      confidence: low
      evidence: 'TODO: review safe default for style'
  model_name:
    level: recommended
    shape: list_value
    transform: text
    manual_review: false
    sources:
    - path: product.attributes.Model Name
    - path: product.attributes.mpn
    - path: product.vendor_sku
  model_number:
    level: recommended
    shape: list_value
    transform: text
    manual_review: false
    sources:
    - path: product.attributes.Model Number
    - path: product.attributes.mpn
    - path: product.vendor_sku
  part_number:
    level: recommended
    shape: list_value
    transform: text
    manual_review: false
    sources:
    - path: product.attributes.Part Number
    - path: product.attributes.mpn
    - path: product.vendor_sku
  material:
    level: recommended
    shape: list_value
    transform: text
    manual_review: false
    sources:
    - path: product.attributes.Main Material
    - path: product.attributes.material
  color:
    level: recommended
    shape: value
    transform: text
    manual_review: false
    sources:
    - path: product.attributes.Main Color
    - path: product.attributes.color
  item_shape:
    level: recommended
    shape: list_value
    transform: text
    manual_review: false
    sources:
    - path: product.attributes.Item Shape
  number_of_items:
    level: recommended
    shape: list_value
    transform: integer
    manual_review: false
    sources:
    - path: product.attributes.Number of Items
  included_components:
    level: recommended
    shape: list_value
    transform: text
    manual_review: false
    sources:
    - path: product.attributes.Included Components
  special_feature:
    level: recommended
    shape: list_value
    transform: text
    manual_review: false
    sources:
    - path: product.attributes.Special Feature
