          evidence: Bootstrap mapping for is_assembly_required.value
        - path: product.requires_assembly
          confidence: high
          evidence: Bootstrap mapping for is_assembly_required.value
  is_fragile:
    shape: array_object
    level: required
    transform: passthrough
    manual_review: true
    enum_values:
    - 'False'
    - 'True'
    required_children:
    - value
    children:
      value:
        shape: value
        enum_values:
        - 'False'
        - 'True'
        transform: enum
        sources:
        - path: product.attributes.Is Fragile?
          confidence: high
          inherited_from: TABLE
        - default: 'False'
          confidence: medium
          evidence: TABLE default for standard wood tables without glass or ceramic
            tops.
          safe_default: true
          inherited_from: TABLE
  model_name:
    shape: array_object
    level: required
    transform: passthrough
    manual_review: true
    required_children:
    - value
    children:
      value:
