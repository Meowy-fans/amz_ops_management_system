attributes:
  item_name:
    level: required
    shape: list_value
    transform: text
    sources:
    - path: content.title
  bullet_point:
    level: required
    shape: list_value
    transform: passthrough
    sources:
    - path: content.bullets
  product_description:
    level: required
    shape: list_value
    transform: text_join
    sources:
    - path: content.description
    - path: product.description
    - path: content.bullets
      confidence: high
      evidence: Compose required description from listing bullets when no persisted
        description exists.
  brand:
    level: required
    shape: list_value
    transform: text
    sources:
    - default: Generic
      confidence: medium
      evidence: Fallback brand for unbranded Giga products.
      safe_default: true
  manufacturer:
    level: recommended
    shape: list_value
    transform: text
    sources:
    - default: Nova Home Essentials
      confidence: medium
      evidence: Existing production default manufacturer for Giga-sourced products.
      safe_default: true
  target_audience_base:
    level: recommended
    shape: list_value
    transform: text
    sources:
    - default: Homeowners
      confidence: medium
      evidence: Default target audience for home and furniture products.
      safe_default: true
  item_type_keyword:
    level: recommended
    shape: list_value
    transform: text
    sources:
    - path: content.title
  item_type_name:
    level: recommended
    shape: list_value
    transform: text
    sources:
    - path: content.title
  country_of_origin:
    level: required
    shape: list_value
    transform: enum
    sources:
    - path: product.attributes.place_of_origin
    - default: CN
      confidence: medium
      evidence: Fallback country for Giga products when place_of_origin is missing.
      safe_default: true
  supplier_declared_dg_hz_regulation:
    level: required
    shape: list_value
    transform: text
    sources:
    - default: not_applicable
      confidence: medium
      evidence: Default for non-hazardous goods; review per category for battery or
        hazmat risk.
      safe_default: true
  externally_assigned_product_identifier:
    level: required
    shape: object
    transform: passthrough
    sources:
    - default:
        type: GTIN_EXEMPTION
        value: product_does_not_have_gtin
      confidence: medium
      evidence: Existing GTIN exemption behavior for listings without supplier product
        identifiers.
      safe_default: true
  supplier_declared_has_product_identifier_exemption:
    level: required
    shape: list_value
    transform: boolean_yes_no
    sources:
    - default: true
      confidence: medium
      evidence: Existing product identifier exemption declaration for GTIN-exempt
        listings.
      safe_default: true
  base_type:
    level: required
    shape: array_object
    transform: passthrough
    manual_review: false
    children:
      value:
        transform: text
        sources:
        - path: product.attributes.Base Type
        - default: Table
          confidence: medium
          evidence: TABLE listing fallback when supplier base type is missing.
          safe_default: true
  frame:
    level: required
    shape: array_object
    transform: passthrough
    manual_review: true
    children:
      material:
        shape: list_value
        transform: text
        children:
          value:
            transform: text
            sources:
            - path: product.attributes.Main Material
              confidence: high
            - path: product.attributes.material
              confidence: high
            - path: product.attributes.Frame Material
              confidence: medium
            - default: Wood
              confidence: medium
              evidence: TABLE frame material fallback for wood dining tables.
              safe_default: true
  top:
    level: required
    shape: array_object
    transform: passthrough
    manual_review: true
    children:
      color:
        shape: list_value
        transform: text
        children:
          value:
            transform: text
            sources:
            - path: product.attributes.Main Color
              confidence: high
            - path: product.attributes.color
              confidence: medium
            - default: Brown
              confidence: medium
              evidence: TABLE top color fallback when supplier color is missing.
              safe_default: true
      material:
        shape: list_value
        transform: text
        children:
          value:
            transform: text
            sources:
            - path: product.attributes.Top Material
              confidence: high
            - path: product.attributes.Main Material
              confidence: high
            - path: product.attributes.material
              confidence: medium
            - default: Wood
              confidence: medium
              evidence: TABLE top material fallback when supplier top material is
                missing.
              safe_default: true
  included_components:
    level: required
    shape: array_object
    transform: passthrough
    manual_review: false
    children:
      value:
        transform: text
        sources:
        - path: product.attributes.Included Components
          confidence: high
        - default: Table
          confidence: medium
          evidence: Single-table listing default when supplier included components
            are missing.
          safe_default: true
  is_fragile:
    level: required
    shape: array_object
    transform: passthrough
    manual_review: false
    children:
      value:
        transform: enum
        sources:
        - path: product.attributes.Is Fragile?
          confidence: high
        - default: 'False'
          confidence: medium
          evidence: TABLE default for standard wood tables without glass or ceramic
            tops.
          safe_default: true
  item_depth_width_height:
    level: required
    shape: array_object
    transform: passthrough
    manual_review: true
    children:
      depth:
        shape: measure
        children:
          value:
            transform: passthrough
            sources:
            - path: product.dimensions.assembled_width
              confidence: high
            - path: product.dimensions.width
              confidence: medium
          unit:
            sources:
            - default: inches
              confidence: high
              evidence: Product dimensions are normalized to inches.
              safe_default: true
      width:
        shape: measure
        children:
          value:
            transform: passthrough
            sources:
            - path: product.dimensions.assembled_length
              confidence: high
            - path: product.dimensions.length
              confidence: medium
          unit:
            sources:
            - default: inches
              confidence: high
              evidence: Product dimensions are normalized to inches.
              safe_default: true
      height:
        shape: measure
        children:
          value:
            transform: passthrough
            sources:
            - path: product.dimensions.assembled_height
              confidence: high
            - path: product.dimensions.height
              confidence: medium
          unit:
            sources:
            - default: inches
              confidence: high
              evidence: Product dimensions are normalized to inches.
              safe_default: true
  item_weight:
    level: required
    shape: array_object
    transform: passthrough
    manual_review: true
    children:
      value:
        transform: passthrough
        sources:
        - path: product.dimensions.assembled_weight
          confidence: high
        - path: product.dimensions.weight
          confidence: medium
      unit:
        sources:
        - default: pounds
          confidence: high
          evidence: Product weight is normalized to pounds.
          safe_default: true
  item_shape:
    level: required
    shape: array_object
    transform: passthrough
    manual_review: false
    children:
      value:
        transform: text
        sources:
        - path: product.attributes.Item Shape
          confidence: high
        - default: Rectangular
          confidence: medium
          evidence: Dining table default shape when supplier item shape is missing.
          safe_default: true
  number_of_items:
    level: required
    shape: array_object
    transform: passthrough
    manual_review: false
    children:
      value:
        transform: integer
        sources:
        - path: product.attributes.Number of Items
          confidence: high
        - default: 1
          confidence: high
          evidence: One purchasable table listing unit.
          safe_default: true
  model_name:
    level: recommended
    shape: list_value
    transform: text
    manual_review: false
    sources:
    - path: product.attributes.Model Name
    - path: product.attributes.mpn
    - path: product.vendor_sku
  model_number:
    level: recommended
    shape: list_value
    transform: text
    manual_review: false
    sources:
    - path: product.attributes.Model Number
    - path: product.attributes.mpn
    - path: product.vendor_sku
  part_number:
    level: recommended
    shape: list_value
    transform: text
    manual_review: false
    sources:
    - path: product.attributes.Part Number
    - path: product.attributes.mpn
    - path: product.vendor_sku
  material:
    level: recommended
    shape: list_value
    transform: text
    manual_review: false
    sources:
    - path: product.attributes.Main Material
    - path: product.attributes.material
  color:
    level: recommended
    shape: list_value
    transform: text
    manual_review: false
    sources:
    - path: product.attributes.Main Color
    - path: product.attributes.color
  room_type:
    level: recommended
    shape: list_value
    transform: text
    manual_review: false
    sources:
    - path: product.attributes.Room Type
  mounting_type:
    level: recommended
    shape: list_value
    transform: text
    manual_review: false
    sources:
    - path: product.attributes.Mounting Type
  special_feature:
    level: recommended
    shape: list_value
    transform: text
    manual_review: false
    sources:
    - path: product.attributes.Special Feature
name: amazon_universal_required_v1
version: table_attribute_rules_v2
product_type: TABLE
mode: live_eligible
generated_from: promote_category_rules_v2
presets:
- amazon_universal_required_v1
dimension_strategy: item_depth_width_height
coverage_ignore_required:
- merchant_shipping_group
- merchant_suggested_asin
