product_type: PLANTER
version: planter_attribute_rules_draft_v1
mode: dry_run
generated_from: amazon_product_type_schema
presets:
- amazon_universal_required_v1
attributes:
  generic_keyword:
    level: required
    shape: list_value
    transform: text
    manual_review: true
    sources:
    - llm:
        hint: Extract generic keyword from the product title, description, bullet
          points, and supplier characteristics. Return null if the information is
          not found.
    - default: null
      confidence: low
      evidence: 'TODO: review safe default for generic_keyword'
  indoor_outdoor_usage:
    level: required
    shape: list_value
    transform: enum
    manual_review: true
    sources:
    - llm:
        hint: Extract indoor outdoor usage from the product title, description, bullet
          points, and supplier characteristics. Return null if the information is
          not found.
    - default: null
      confidence: low
      evidence: 'TODO: review safe default for indoor_outdoor_usage'
  item_depth_width_height:
    level: required
    shape: object
    transform: passthrough
    manual_review: true
    sources:
    - default: null
      confidence: low
      evidence: 'TODO: review source mapping for item_depth_width_height'
  item_shape:
    level: required
    shape: list_value
    transform: text
    manual_review: false
    sources:
    - path: product.attributes.Item Shape
    - llm:
        hint: Extract item shape from the product title, description, bullet points,
          and supplier characteristics. Return null if the information is not found.
    - default: null
      confidence: low
      evidence: 'TODO: review safe default for item_shape'
  mounting_type:
    level: required
    shape: list_value
    transform: text
    manual_review: false
    sources:
    - path: product.attributes.Mounting Type
    - llm:
        hint: Extract mounting type from the product title, description, bullet points,
          and supplier characteristics. Return null if the information is not found.
    - default: null
      confidence: low
      evidence: 'TODO: review safe default for mounting_type'
  number_of_items:
    level: required
    shape: list_value
    transform: integer
    manual_review: false
    sources:
    - path: product.attributes.Number of Items
    - llm:
        hint: Extract number of items from the product title, description, bullet
          points, and supplier characteristics. Return null if the information is
          not found.
    - default: 1
      confidence: medium
      evidence: Single-item listing fallback when supplier data lacks package count.
      safe_default: true
  required_product_compliance_certificate:
    level: required
    shape: list_value
    transform: enum
    manual_review: true
    sources:
    - default: null
      confidence: low
      evidence: 'TODO: review source mapping for required_product_compliance_certificate'
  special_feature:
    level: required
    shape: list_value
    transform: text
    manual_review: false
    sources:
    - path: product.attributes.Special Feature
    - llm:
        hint: Extract special feature from the product title, description, bullet
          points, and supplier characteristics. Return null if the information is
          not found.
    - default: null
      confidence: low
      evidence: 'TODO: review safe default for special_feature'
  style:
    level: required
    shape: list_value
    transform: text
    manual_review: true
    sources:
    - llm:
        hint: Extract style from the product title, description, bullet points, and
          supplier characteristics. Return null if the information is not found.
    - default: null
      confidence: low
      evidence: 'TODO: review safe default for style'
  model_name:
    level: recommended
    shape: list_value
    transform: text
    manual_review: false
    sources:
    - path: product.attributes.Model Name
    - path: product.attributes.mpn
    - path: product.vendor_sku
  model_number:
    level: recommended
    shape: list_value
    transform: text
    manual_review: false
    sources:
    - path: product.attributes.Model Number
    - path: product.attributes.mpn
    - path: product.vendor_sku
  part_number:
    level: recommended
    shape: list_value
    transform: text
    manual_review: false
    sources:
    - path: product.attributes.Part Number
    - path: product.attributes.mpn
    - path: product.vendor_sku
  material:
    level: recommended
    shape: list_value
    transform: text
    manual_review: false
    sources:
    - path: product.attributes.Main Material
    - path: product.attributes.material
  color:
    level: recommended
    shape: list_value
    transform: text
    manual_review: false
    sources:
    - path: product.attributes.Main Color
    - path: product.attributes.color
  included_components:
    level: recommended
    shape: list_value
    transform: text
    manual_review: false
    sources:
    - path: product.attributes.Included Components
