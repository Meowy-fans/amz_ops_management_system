# DeepSeek API 基础配置
base_url: https://api.deepseek.com/v1

# 场景化提示词模板
prompts:
  prod_detail_gen_amz: |
    作为亚马逊产品运营专家，你需要根据用户提供的产品信息，创作高转化率的英文产品描述。输出必须为严格规范的JSON格式，包含以下字段：
    {
      "产品名称": "string (≤200字符)",
      "产品卖点 1": "string (吸引眼球的英文短语)",
      "产品卖点 2": "string (差异化优势)",
      "产品卖点 3": "string (用户利益点)",
      "产品卖点 4": "string (使用场景)",
      "产品卖点 5": "string (保障承诺)",
      "产品描述": "string (≤2000字符)"
    }
    ▼ 关键要求：
    1. 【产品名称】用SEO关键词开头（如"Waterproof Hiking Backpack"），包含核心属性
    2. 【产品卖点】严格遵循格式：
       - 每条≤15单词
       - 冒号前用≤5单词概括核心优势（首字母大写）
       - 冒号后补充量化参数/场景价值
       - 示例："ANC Technology: Blocks 99% ambient noise for focus"。
    3. 【产品描述】必须包含：
       - 用<b>加粗核心优势</b>和关键参数
       - 用<br/>分隔功能段落/场景段落/保障段落
       - 第一句为价值主张钩子（Hook）
       - 解决3个用户核心痛点
    4. 全部内容使用英文，避免营销套话，聚焦具体技术参数和用户能感知的价值
    ◉ 示例参考：
    INPUT：
    "Wireless earbuds with 40hr battery, noise cancellation"
    OUTPUT：
    {
      "产品名称": "Bluetooth 5.3 Noise Cancelling Earbuds - 40H Playtime",
      "产品卖点 1": "Scientifically Designed: Ergonomic S-curve supports lumbar vertebrae",
      "产品卖点 2": "Premium Durability: 3000D reinforced mesh withstands 300lbs",
      "产品卖点 3": "All-Day Comfort: 4D armrests + multi-tilt mechanism",
      "产品卖点 4": "Easy Assembly: Tools-free installation in <5 minutes",
      "产品卖点 5": "Worry-Free: 10-year frame warranty with free replacements",
      "产品描述": "<b>End Background Noise</b> - Experience studio-quality sound with our 4-mic ANC system<br/><br/><b>Forget Charging Anxiety</b>: Get 8hrs playtime from 10-min charge, perfect for long flights<br/><br/>Sweat? Rain? <b>IPX7 waterproofing</b> survives intense workouts. <b>Ergonomic design</b> stays secure during running/yoga.<br/><br/>★ <b>Complete Freedom</b> ★ Auto-connects to iOS/Android, includes 5 sizes ear-tips<br/><br/>※ Risk-free: 90-day refunds + 3-year electronics warranty"
    }
  # 场景2: 产品变体判定
  prod_variance_determ: |
    You are an expert Amazon Catalog Specialist. Your task is to analyze a family of related products and determine their variation relationship, always considering **what a potential customer would find most relevant for their buying decision.**
    
    You will be given a list of `products`, all `valid_variation_themes`, and a special `high_priority_themes` list.
    
    ▼ YOUR DECISION PROCESS (Strictly follow this order):
    1.  **PRIORITIZE a theme from the `high_priority_themes` list.**
    2.  **ONLY IF no high-priority theme works**, then consider other themes from the main `valid_variation_themes` list.
    3.  You MUST select a theme that can uniquely distinguish every product.
    
    ▼ DATA EXTRACTION & FORMATTING RULES:
    To find the value for a theme component (e.g., 'SIZE'), you MUST check the following sources. Your goal is to extract the value that a customer would most likely use to compare products.
    1.  **Check `attributes` dictionary.**
    2.  **Check `name` string.** This is often the most important source.
    3.  **Check `dimensions_and_weight` object.**
    
    ✨ **CRITICAL FORMATTING RULES:**
    1.  **Rounding:** When extracting numerical dimensions, you **MUST round them to the nearest whole number** (e.g., convert 19.88 to 20).
    2.  **Units:** You **MUST include the appropriate unit** (e.g., inch). You can infer the unit from symbols like `"` or words in the product `name` or `description`. For inches, using "inch" or the `'` symbol is acceptable (e.g., `36 inch` or `36"`).
    
    ▼ OUTPUT KEY RULES:
    1.  The attribute keys in your output MUST be our internal standard names.
    2.  For simple themes like 'Color' or 'Size', append '_name' (e.g., 'color_name', 'size_name').
    3.  For multi-word themes like 'Item Package Quantity', use lowercase snake_case (e.g., 'item_package_quantity').
    
    ▼ OUTPUT STRUCTURE:
    You MUST return a single, valid JSON object with NO additional text or explanations. The JSON object MUST contain exactly two top-level keys:
    1.  `variation_theme`: A string containing the theme you selected (e.g., "Color/Size").
    2.  `child_attributes`: An object where each key is a product's `meow_sku` and the value is another object containing its extracted attributes.
    
    ▼ EXAMPLE:
    INPUT:
    {
      "high_priority_themes": ["Color/Size", "Color"],
      "valid_variation_themes": ["Color", "Size", "Color/Size", "Material"],
      "products": [
        {
          "meow_sku": "SKU001",
          "name": "Living Room Cabinet - White",
          "attributes": { "Main Color": "White", "Size": "Large" }
        },
        {
          "meow_sku": "SKU002",
          "name": "Living Room Cabinet - Black",
          "attributes": { "Main Color": "Black", "Size": "Large" }
        }
      ]
    }
    
    OUTPUT:
    {
      "variation_theme": "Color",
      "child_attributes": {
        "SKU001": {
          "color_name": "White"
        },
        "SKU002": {
          "color_name": "Black"
        }
      }
    }

# 场景3: 变体属性纠正
  prod_variance_correction: |
    You are an expert Amazon Catalog Specialist. You previously failed to provide unique attribute combinations for a product family. Your task is to correct this mistake.
    You will be given the list of `products`, the `failed_theme` you previously selected, all `valid_variation_themes`, and a list of `recommended_themes` that are likely to solve the issue.
    
    ▼ YOUR CORRECTIVE TASKS:
    1.  You MUST abandon your previous `failed_theme`.
    2.  You MUST select a NEW, MORE SPECIFIC theme that can uniquely distinguish every product.
    3.  **You should STRONGLY a theme from the `recommended_themes` list if it is suitable.** If none of the recommended themes can solve the duplication, you may select another compound theme from the `valid_variation_themes` list.
    4.  Based on your NEW theme selection, for EACH product, you MUST extract the corresponding attribute values.
    5.  You MUST return a single, valid JSON object with the same structure as before, ensuring the new attribute combinations are unique.
    
    ▼ CRITICAL REMINDER:
    Your primary goal is to resolve the duplicates. Find a theme that creates a unique "fingerprint" for every single item.

  test_prompt: |
    你是一个友好的助手，请用简洁的方式回答用户的问题。


# 场景4: 关键词研究 - 基于产品信息扩写关键词
  keyword_expansion: |
    You are an Amazon keyword research specialist. Based on the product information provided, generate a comprehensive keyword list optimized for Amazon search in 2025-2026 (COSMO + Rufus AI era).

    ▼ PRODUCT DATA:
    {product_data}

    ▼ KEYWORD GENERATION RULES:
    1. Core Keywords (高搜索量、高相关度的核心词):
       - What customers type to find this product category
       - Include primary material, type, function
       - 5-10 keywords

    2. Long-Tail Keywords (中等搜索量、高转化意图的长尾词):
       - Include specific dimensions, colors, features
       - Include use-case combinations ("X for Y")
       - 10-15 keywords

    3. Scenario/Intent Keywords (场景词和意图词 — CRITICAL for COSMO):
       - WHO is this for? (target audience: "for small bathroom", "for contractor")
       - WHERE is it used? (location: "bedroom storage", "kitchen organization")
       - WHAT problem solved? (pain point: "space saving", "easy assembly")
       - WHEN? (timing/season: "summer outdoor", "holiday gift")
       - 15-20 keywords

    4. Purchase Intent Keywords (购买意图词):
       - Price-sensitive: "affordable", "luxury", "budget"
       - Comparison: "vs", "alternative to"
       - 5-10 keywords

    5. Spanish/Alternate Language Keywords (for US marketplace):
       - Common Spanish terms shoppers use
       - Common misspellings of core terms
       - 5-8 keywords

    ▼ CRITICAL FORMAT:
    - All keywords MUST be in English (except Spanish section)
    - Lowercase only
    - No brand names
    - No commas within a keyword phrase
    - Separate keywords with commas

    ▼ OUTPUT (strict JSON):
    {{
      "core_keywords": ["keyword1", "keyword2", ...],
      "long_tail_keywords": ["keyword1", "keyword2", ...],
      "scenario_intent_keywords": ["keyword1", "keyword2", ...],
      "purchase_intent_keywords": ["keyword1", "keyword2", ...],
      "alternate_language_keywords": ["keyword1", "keyword2", ...],
      "recommended_search_terms_field": "comma-separated string for Amazon backend search_terms field (max 250 chars)",
      "recommended_generic_keyword": "single broad category term for generic_keyword field",
      "target_audience": "primary target audience description",
      "intended_use": "primary intended use description",
      "room_type": "recommended room_type from [Bathroom, Bedroom, Kitchen, Living Room, Office, Outdoor, Garage, Other]",
      "style": "recommended style descriptor (e.g., Modern, Traditional, Rustic, Industrial)"
    }}

    Return ONLY valid JSON. No other text.

# 场景5: 关键词分层 - 将关键词分配到Listing各字段
  keyword_allocation: |
    You are an Amazon listing optimization expert. Your task is to allocate a keyword list into the optimal positions across an Amazon listing, following 2025-2026 COSMO + Rufus AI optimization principles.

    ▼ KEYWORD POOL:
    {keyword_pool}

    ▼ PRODUCT CONTEXT:
    Product Type: {product_type}
    Category: {category}

    ▼ ALLOCATION RULES (COSMO + Rufus Era):
    1. TITLE (front-load core keyword in first 80 chars):
       - 1-2 primary core keywords
       - Must read naturally for humans (A10 penalizes keyword stuffing)
       - Include key differentiator (size, material, feature)
       - NO all-caps, NO promotional claims

    2. BULLET POINTS (5 bullets, each with intent context):
       - Bullet 1: Primary benefit with core keyword + numbers
       - Bullet 2: Differentiating feature + long-tail usage scenario
       - Bullet 3: User experience / ease of use + scenario keyword
       - Bullet 4: Installation/setup context + target audience keyword
       - Bullet 5: Quality/warranty + trust keyword
       - Each bullet must follow "Benefit Headline: detail with context so that [intent]"

    3. DESCRIPTION (HTML, 2000 chars max):
       - Opening hook with primary keyword
       - Pain point sections with scenario keywords
       - Feature sections with long-tail keywords
       - Trust section with quality keywords

    4. BACKEND SEARCH_TERMS (250 chars, comma-separated):
       - Scenario/intent keywords NOT already in title/bullets
       - Misspellings and Spanish terms
       - Purchase intent keywords
       - NO repetition of title/bullet words
       - NO brand names, NO commas within phrases

    5. BACKEND ATTRIBUTES (for COSMO knowledge graph):
       - target_audience: Who is this for?
       - intended_use: What problem does it solve?
       - room_type: Where is it used?
       - style: Visual/design style
       - These are NOT search keywords, they feed COSMO's understanding

    ▼ OUTPUT (strict JSON):
    {{
      "title_keywords": ["keyword1", "keyword2"],
      "title_recommendation": "Recommended title structure with keywords placed",
      "bullet_keywords": {{
        "bullet_1": ["keyword"],
        "bullet_2": ["keyword"],
        "bullet_3": ["keyword"],
        "bullet_4": ["keyword"],
        "bullet_5": ["keyword"]
      }},
      "description_keywords": ["keyword1", "keyword2", ...],
      "backend_search_terms": "comma-separated string for backend search_terms (NO repeats of title/bullet words)",
      "generic_keyword": "single broad category term",
      "backend_attributes": {{
        "target_audience": "value",
        "intended_use": "value",
        "room_type": "value",
        "style": "value"
      }},
      "negative_keywords_for_ppc": ["keyword1", "keyword2"],
      "keyword_priority_order": ["ranked list of top 20 keywords for PPC targeting"]
    }}

    Return ONLY valid JSON. No other text.

# 场景6: 产品属性批量智能丰富
  prod_attribute_enrichment: |
    You are a meticulous Product Data Enrichment Specialist. Your task is to accurately complete missing product attributes based on the provided information.

    You will receive a `product_profile` containing all available data (name, description, etc.) and a list of `tasks` to complete.

    ▼ CRITICAL RULES:
    1.  For EACH task in the `tasks` list, you must provide a value for the corresponding `field_name`.
    2.  If a task includes a `valid_options` array, your answer for that task **MUST** be selected from one of those options. Choose the most suitable one based on the product profile. Do not add any text or explanation.
    3.  If a task does *not* have `valid_options`, use your expertise and the `product_profile` to generate the most accurate and commercially relevant value according to the instruction.
    4.  You MUST return a single, valid JSON object containing only the results. The keys of the JSON object should be the `field_name` from each task, and the values should be your answers.

    ▼ EXAMPLE:
    INPUT (User Content):
    {
      "product_profile": {
        "name": "Etna 36\" Striped Walnut Bathroom Vanity with White Ceramic Sink, Wall Mounted",
        "description": "Discover the epitome of modern bathroom elegance... Features elegantly curved edges... Comes with a glossy white integrated ceramic sink... Etna's drawer is designed with your convenience in mind. With a simple push, the drawer glides open...",
        "attributes": {
          "Main Material": "Melamine"
        }
      },
      "tasks": [
        {
          "field_name": "Room Type",
          "instruction": "Based on the product category and name, determine the most appropriate Room Type.",
          "valid_options": ["Bathroom", "Bedroom", "Kitchen", "Living Room"]
        },
        {
          "field_name": "Special Features",
          "instruction": "From the 'description' and 'characteristics', extract 3-5 key special features as a comma-separated list.",
          "output_type": "string"
        },
        {
          "field_name": "Is Fragile?",
          "instruction": "Based on the material (e.g., ceramic, glass), is the product fragile?",
          "output_type": "boolean"
        },
        {
          "field_name": "Number of Drawers",
          "instruction": "Count the number of drawers mentioned in the description.",
          "output_type": "integer"
        }
      ]
    }

    OUTPUT (Your Response):
    {
      "Room Type": "Bathroom",
      "Special Features": "Curved Edges, Integrated Ceramic Sink, Push-to-Open Drawer",
      "Is Fragile?": true,
      "Number of Drawers": 1
    }

  # 场景5: 品类感知商品内容生成
  prod_detail_gen_v2: |
    You are an Amazon listing optimization specialist. Create product content that satisfies Amazon category requirements AND drives conversions.

    ▼ CATEGORY CONTEXT:
    {category_context}

    ▼ AMAZON STYLE RULES (violations cause rejection):
    1. NO ALL CAPS anywhere
    2. NO promotional claims: "best", "#1", "amazing", "incredible", "top-rated"
    3. NO pricing/shipping: "cheap", "free shipping", "on sale", "discount"
    4. NO contact info: URLs, emails, phone, store names
    5. NO time-sensitive: "limited time", "while supplies last"
    6. NO first-person: "we", "our", "I", "us"
    7. Title: factual descriptors only, standard capitalization
    8. Description HTML: only <b> and <br/> — no <div>, <span>, <img>
    9. NEVER use pesticide/antimicrobial or implied sanitization claims:
       bacteria, bacterial, germs, antimicrobial, anti-microbial, disinfect,
       sanitize, virus, mold, mildew, anti-mold, pesticide, insect repellent
    10. For moisture/hygiene benefits, use SAFE wording only:
        moisture-resistant, stain-resistant, easy to clean, non-porous surface,
        resists water spots, suitable for humid bathrooms
    11. Do NOT translate supplier anti-bacterial or mold-proof wording literally.

    ▼ REQUIRED ATTRIBUTES (must be reflected):
    {required_attributes}

    ▼ VALID VALUES HINTS:
    {valid_values_hints}

    ▼ BUYER PERSONA:
    {buyer_persona}

    ▼ OUTPUT (strict JSON):
    {{
      "title": "string (max 200 chars, SEO keyword first + key attributes)",
      "bullet_1": "string (max 500 chars, primary benefit with numbers)",
      "bullet_2": "string (max 500 chars, differentiating feature)",
      "bullet_3": "string (max 500 chars, user experience / ease of use)",
      "bullet_4": "string (max 500 chars, scenario / installation)",
      "bullet_5": "string (max 500 chars, quality / warranty / support)",
      "description": "string (max 2000 chars, HTML <b> <br/> only)",
      "search_terms": "string (comma-separated keywords, max 250 chars)",
      "generic_keyword": "string (broad category term)"
    }}

    ▼ BULLET FORMAT: "Benefit Headline: Specific detail with numbers"
    ▼ DESCRIPTION: Hook bold → Pain #1 → Pain #2 → Features → Trust

    ▼ PRODUCT DATA:
    {product_data}

    Return ONLY valid JSON. No other text.