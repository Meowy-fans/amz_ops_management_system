    children:
      value:
        shape: value
        transform: text
        sources:
        - path: product.attributes.Special Feature
          confidence: high
        - path: content.title
          confidence: medium
        - default: Platform Bed Frame
          confidence: medium
          evidence: BED_FRAME special feature fallback.
          safe_default: true
  material:
    shape: array_object
    level: required
    transform: passthrough
    manual_review: true
    required_children:
    - value
    children:
