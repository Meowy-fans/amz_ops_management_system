name: CI

on:
  pull_request:
    branches:
      - main
      - master
  push:
    branches:
      - main
      - master

jobs:
  python:
    uses: Meowy-fans/agent-system/.github/workflows/templates/python-ci.yml@main
    with:
      python-version: '3.12'
      enable_pytest: false
      enable_ruff: true
      enable_mypy: true
      enable_governance: true
      ruff_path: 'src/'
      mypy_path: 'src/'
      runs_on: 'staging'

  test:
    runs-on:
      - self-hosted
      - ci
    timeout-minutes: 15

    env:
      APP_ENV: test
      LOG_LEVEL: INFO
      DATABASE_HOST: localhost
      DATABASE_PORT: "5432"
      DATABASE_NAME: amz_listing_test
      DATABASE_USER: postgres
      DATABASE_PASSWORD: postgres
      LLM_SERVICE_MODE: direct
      LLM_PROVIDER: qwen
      GIGA_BASE_URL: https://api.gigacloudlogistics.com

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Prepare Python environment
        run: |
          python3 -m venv .venv
          . .venv/bin/activate
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -e ".[dev]"

      - name: Run tests
        run: |
          . .venv/bin/activate
          pytest

      - name: Coverage baseline
        run: |
          . .venv/bin/activate
          pytest --cov=src --cov=infrastructure --cov-report=term-missing --cov-fail-under=35

  docs-check:
    runs-on:
      - self-hosted
      - ci
    timeout-minutes: 5

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: 检查文件体积红线
        run: |
          violations=$(find src/ -name '*.py' -exec wc -l {} + | awk '$1>500{print $2":"$1" 行"}')
          if [ -n "$violations" ]; then
            echo "❌ 以下文件超过500行红线:"
            echo "$violations"
            exit 1
          fi
          echo "✅ 文件体积检查通过"

      - name: 检查新增 service 是否有对应文档
        run: |
          new_services=$(git diff --name-only origin/main...HEAD -- 'src/services/*.py' 2>/dev/null || echo "")
          if [ -z "$new_services" ]; then
            echo "✅ 无新增 service 模块"
            exit 0
          fi
          missing=""
          for f in $new_services; do
            module=$(basename "$f" .py)
            if [ ! -f "docs/module-design/${module}.md" ]; then
              missing="$missing  $f → 缺少 docs/module-design/${module}.md\n"
            fi
          done
          if [ -n "$missing" ]; then
            echo "❌ 新增 service 模块缺少设计文档:"
            printf "%b" "$missing"
            exit 1
          fi
          echo "✅ 新增模块文档检查通过"

      - name: 死代码检测
        run: |
          pip install vulture -q 2>/dev/null
          python -m vulture src/ --min-confidence 80 || true
          echo "⚠️  死代码检测仅供参考，不阻塞 CI"

      - name: @retire 标记检查
        run: |
          python3 ~/scripts/check_retirement.py . --block --max-deprecated-pct 10
