services:
  amz-listing-management-system:
    image: amz-listing-management-system:2026-06-28-category-rule-lifecycle
    build:
      context: /home/liangqinhao/amz_listing_management_system
      dockerfile: Dockerfile
      args:
        BASE_IMAGE: amz-listing-management-system:2026-05-17
        SKIP_REQUIREMENTS_INSTALL: "true"
    container_name: amz-listing-management-system
    restart: unless-stopped
    env_file:
      - path: .env
        required: true
      - path: .env.amazon-sp-api
        required: false
    environment:
      APP_ENV: production
      APP_MODE: ${APP_MODE:-server}
      IO_SERVER_HOST: 0.0.0.0
      IO_SERVER_PORT: 8080
      DATABASE_HOST: postgres
      DATABASE_PORT: 5432
      DATABASE_NAME: ${DATABASE_NAME:-amz_listing}
      DATABASE_USER: ${DATABASE_USER:-amz_listing}
      DATABASE_PASSWORD: ${DATABASE_PASSWORD}
      GIGA_BASE_URL: ${GIGA_BASE_URL:-https://api.gigacloudlogistics.com}
    volumes:
      - /data/volumes/amz-listing-management-system/data:/app/data
      - /data/volumes/amz-listing-management-system/output:/app/output
      - /data/volumes/amz-listing-management-system/logs:/app/logs
      - /etc/localtime:/etc/localtime:ro
    networks:
      - proxy
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "python -c \"import socket; s=socket.create_connection(('127.0.0.1', 8080), 3); s.close()\"",
        ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.amz-listing.rule=Host(`amz-listing.meowy.fans`)"
      - "traefik.http.routers.amz-listing.entrypoints=websecure"
      - "traefik.http.routers.amz-listing.tls.certresolver=letsencrypt"
      - "traefik.http.routers.amz-listing.tls.domains[0].main=meowy.fans"
      - "traefik.http.routers.amz-listing.tls.domains[0].sans=*.meowy.fans"
      - "traefik.http.routers.amz-listing.middlewares=security-headers@file,rate-limit@file,forward-auth@file"
      - "traefik.http.services.amz-listing.loadbalancer.server.port=8080"

  amz-order-sync-scheduler:
    image: amz-listing-management-system:2026-06-28-category-rule-lifecycle
    build:
      context: /home/liangqinhao/amz_listing_management_system
      dockerfile: Dockerfile
      args:
        BASE_IMAGE: amz-listing-management-system:2026-05-17
        SKIP_REQUIREMENTS_INSTALL: "true"
    container_name: amz-order-sync-scheduler
    restart: unless-stopped
    env_file:
      - path: .env
        required: true
      - path: .env.amazon-sp-api
        required: false
    environment:
      APP_ENV: production
      APP_MODE: cli
      DATABASE_HOST: postgres
      DATABASE_PORT: 5432
      DATABASE_NAME: ${DATABASE_NAME:-amz_listing}
      DATABASE_USER: ${DATABASE_USER:-amz_listing}
      DATABASE_PASSWORD: ${DATABASE_PASSWORD}
      GIGA_BASE_URL: ${GIGA_BASE_URL:-https://api.gigacloudlogistics.com}
      AMAZON_ORDER_SYNC_INTERVAL_SECONDS: ${AMAZON_ORDER_SYNC_INTERVAL_SECONDS:-1800}
      AMAZON_ORDER_SYNC_INITIAL_DELAY_SECONDS: ${AMAZON_ORDER_SYNC_INITIAL_DELAY_SECONDS:-120}
      AMAZON_ORDER_SYNC_LOOKBACK_HOURS: ${AMAZON_ORDER_SYNC_LOOKBACK_HOURS:-48}
      AMAZON_ORDER_SYNC_NOTIFY: ${AMAZON_ORDER_SYNC_NOTIFY:-true}
    volumes:
      - /data/volumes/amz-listing-management-system/data:/app/data
      - /data/volumes/amz-listing-management-system/output:/app/output
      - /data/volumes/amz-listing-management-system/logs:/app/logs
      - /etc/localtime:/etc/localtime:ro
    command: ["sh", "scripts/sync_amazon_orders_loop.sh"]
    depends_on:
      - amz-listing-management-system
    networks:
      - proxy

