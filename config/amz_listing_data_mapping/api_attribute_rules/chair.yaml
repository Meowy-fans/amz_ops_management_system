product_type: CHAIR
version: chair_attribute_rules_draft_v1
mode: dry_run
generated_from: amazon_product_type_schema
presets:
- amazon_universal_required_v1
attributes:
  frame:
    level: required
    shape: value
    transform: text
    manual_review: true
    sources:
    - llm:
        hint: Extract frame from the product title, description, bullet points, and
          supplier characteristics. Return null if the information is not found.
    - default: null
      confidence: low
      evidence: 'TODO: review safe default for frame'
  included_components:
    level: required
    shape: list_value
    transform: text
    manual_review: false
    sources:
    - path: product.attributes.Included Components
    - llm:
        hint: Extract included components from the product title, description, bullet
          points, and supplier characteristics. Return null if the information is
          not found.
    - default: null
      confidence: low
      evidence: 'TODO: review safe default for included_components'
  is_assembly_required:
    level: required
    shape: list_value
    transform: enum
    manual_review: false
    sources:
    - path: product.attributes.Assembly Required
    - path: product.requires_assembly
    - llm:
        hint: Extract is assembly required from the product title, description, bullet
          points, and supplier characteristics. Return null if the information is
          not found.
    - default: null
      confidence: low
      evidence: 'TODO: review safe default for is_assembly_required'
  is_fragile:
    level: required
    shape: list_value
    transform: enum
    manual_review: true
    sources:
    - llm:
        hint: Extract is fragile from the product title, description, bullet points,
          and supplier characteristics. Return null if the information is not found.
    - default: null
      confidence: low
      evidence: 'TODO: review safe default for is_fragile'
  item_depth_width_height:
    level: required
    shape: object
    transform: passthrough
    manual_review: true
    sources:
    - default: null
      confidence: low
      evidence: 'TODO: review source mapping for item_depth_width_height'
  item_shape:
    level: required
    shape: list_value
    transform: text
    manual_review: false
    sources:
    - path: product.attributes.Item Shape
    - llm:
        hint: Extract item shape from the product title, description, bullet points,
          and supplier characteristics. Return null if the information is not found.
    - default: null
      confidence: low
      evidence: 'TODO: review safe default for item_shape'
  maximum_weight_recommendation:
    level: required
    shape: measure
    transform: passthrough
    manual_review: true
    sources:
    - llm:
        hint: Extract maximum weight recommendation from the product title, description,
          bullet points, and supplier characteristics. Return null if the information
          is not found.
    - default: null
      confidence: low
      evidence: 'TODO: review safe default for maximum_weight_recommendation'
  number_of_items:
    level: required
    shape: list_value
    transform: integer
    manual_review: false
    sources:
    - path: product.attributes.Number of Items
    - llm:
        hint: Extract number of items from the product title, description, bullet
          points, and supplier characteristics. Return null if the information is
          not found.
    - default: 1
      confidence: medium
      evidence: Single-item listing fallback when supplier data lacks package count.
      safe_default: true
  seat:
    level: required
    shape: value
    transform: text
    manual_review: true
    sources:
    - llm:
        hint: Extract seat from the product title, description, bullet points, and
          supplier characteristics. Return null if the information is not found.
    - default: null
      confidence: low
      evidence: 'TODO: review safe default for seat'
  model_name:
    level: recommended
    shape: list_value
    transform: text
    manual_review: false
    sources:
    - path: product.attributes.Model Name
    - path: product.attributes.mpn
    - path: product.vendor_sku
  model_number:
    level: recommended
    shape: list_value
    transform: text
    manual_review: false
    sources:
    - path: product.attributes.Model Number
    - path: product.attributes.mpn
    - path: product.vendor_sku
  part_number:
    level: recommended
    shape: list_value
    transform: text
    manual_review: false
    sources:
    - path: product.attributes.Part Number
    - path: product.attributes.mpn
    - path: product.vendor_sku
  material:
    level: recommended
    shape: list_value
    transform: text
    manual_review: false
    sources:
    - path: product.attributes.Main Material
    - path: product.attributes.material
  fabric_type:
    level: recommended
    shape: list_value
    transform: text
    manual_review: false
    sources:
    - path: product.attributes.Fabric Type
    - path: product.attributes.Main Material
  color:
    level: recommended
    shape: list_value
    transform: text
    manual_review: false
    sources:
    - path: product.attributes.Main Color
    - path: product.attributes.color
  room_type:
    level: recommended
    shape: list_value
    transform: text
    manual_review: false
    sources:
    - path: product.attributes.Room Type
  special_feature:
    level: recommended
    shape: list_value
    transform: text
    manual_review: false
    sources:
    - path: product.attributes.Special Feature
