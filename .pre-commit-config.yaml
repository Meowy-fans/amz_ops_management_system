repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.5.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-added-large-files

  - repo: https://github.com/psf/black
    rev: 23.11.0
    hooks:
      - id: black

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.1.6
    hooks:
      - id: ruff
        args: [ --fix ]

  - repo: local
    hooks:
      - id: check-file-size
        name: 单文件不超过500行
        entry: bash -c 'violations=$(find src/ -name "*.py" -exec wc -l {} + | awk "\$1>500{print \$2\":\"\$1\" 行\"}" | grep .); [ -z "$violations" ] || { echo "❌ 以下文件超过500行红线:"; echo "$violations"; exit 1; }'
        language: system
        always_run: true
        pass_filenames: false

      - id: check-retire-expired
        name: @retire 标记到期检查
        entry: bash -c 'python3 ~/scripts/check_retirement.py . --block --max-deprecated-pct 10'
        language: system
        always_run: true
        pass_filenames: false
