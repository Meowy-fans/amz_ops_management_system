attributes:
  item_name:
    level: required
    shape: list_value
    transform: text
    sources:
    - path: content.title
  bullet_point:
    level: required
    shape: list_value
    transform: passthrough
    sources:
    - path: content.bullets
  product_description:
    level: required
    shape: list_value
    transform: text_join
    sources:
    - path: content.description
    - path: product.description
    - path: content.bullets
      confidence: high
      evidence: Compose required description from listing bullets when no persisted
        description exists.
  brand:
    level: required
    shape: list_value
    transform: text
    sources:
    - default: Generic
      confidence: medium
      evidence: Fallback brand for unbranded Giga products.
      safe_default: true
  manufacturer:
    level: recommended
    shape: list_value
    transform: text
    sources:
    - default: Nova Home Essentials
      confidence: medium
      evidence: Existing production default manufacturer for Giga-sourced products.
      safe_default: true
  target_audience_base:
    level: recommended
    shape: list_value
    transform: text
    sources:
    - default: Homeowners
      confidence: medium
      evidence: Default target audience for home and furniture products.
      safe_default: true
  item_type_keyword:
    level: recommended
    shape: list_value
    transform: text
    sources:
    - path: content.title
  item_type_name:
    level: recommended
    shape: list_value
    transform: text
    sources:
    - path: content.title
  country_of_origin:
    level: required
    shape: list_value
    transform: enum
    sources:
    - path: product.attributes.place_of_origin
    - default: CN
      confidence: medium
      evidence: Fallback country for Giga products when place_of_origin is missing.
      safe_default: true
  supplier_declared_dg_hz_regulation:
    level: required
    shape: list_value
    transform: text
    sources:
    - default: not_applicable
      confidence: medium
      evidence: Default for non-hazardous goods; review per category for battery or
        hazmat risk.
      safe_default: true
  externally_assigned_product_identifier:
    level: required
    shape: object
    transform: passthrough
    sources:
    - default:
        type: GTIN_EXEMPTION
        value: product_does_not_have_gtin
      confidence: medium
      evidence: Existing GTIN exemption behavior for listings without supplier product
        identifiers.
      safe_default: true
  supplier_declared_has_product_identifier_exemption:
    level: required
    shape: list_value
    transform: boolean_yes_no
    sources:
    - default: true
      confidence: medium
      evidence: Existing product identifier exemption declaration for GTIN-exempt
        listings.
      safe_default: true
  fabric_type:
    level: required
    shape: list_value
    transform: text
    sources:
    - path: product.attributes.Fabric Type
    - path: product.attributes.Main Material
    - path: product.attributes.material
    - default: Polyester
      confidence: medium
      evidence: Safe fallback only when supplier fabric field is unavailable.
      safe_default: true
  room_type:
    level: recommended
    shape: list_value
    transform: text
    sources:
    - path: product.attributes.Room Type
    - default: Living Room
      confidence: medium
      evidence: Common ottoman placement; safe recommendation only.
      safe_default: true
  included_components:
    level: recommended
    shape: list_value
    transform: text
    sources:
    - path: product.attributes.Included Components
    - default: Ottoman
      confidence: high
      evidence: Listing unit includes the ottoman itself.
      safe_default: true
  model_name:
    level: required
    shape: list_value
    transform: text
    sources:
    - path: product.attributes.Model Name
    - path: product.attributes.mpn
    - path: product.vendor_sku
  number_of_items:
    level: required
    shape: value
    transform: integer
    sources:
    - path: product.attributes.Number of Items
    - default: 1
      confidence: high
      evidence: One purchasable ottoman listing unit.
      safe_default: true
  is_assembly_required:
    level: required
    shape: list_value
    transform: enum
    sources:
    - path: product.attributes.Assembly Required
    - default: 'False'
      confidence: medium
      evidence: Storage ottoman benches in this assortment normally require no customer
        assembly beyond placing the unit.
      safe_default: true
  is_fragile:
    level: required
    shape: list_value
    transform: enum
    sources:
    - path: product.attributes.Is Fragile?
    - default: 'False'
      confidence: high
      evidence: Upholstered ottoman benches are not fragile by default and have no
        glass/ceramic components in this assortment.
      safe_default: true
  item_shape:
    level: required
    shape: list_value
    transform: text
    sources:
    - path: product.attributes.Item Shape
    - default: Oval
      confidence: medium
      evidence: Conservative fallback for the current OTTOMAN evidence SKU title;
        review if source title indicates square or rectangular.
      safe_default: true
  base_type:
    level: required
    shape: list_value
    transform: text
    sources:
    - path: product.attributes.Base Type
    - default: Legs
      confidence: medium
      evidence: Current OTTOMAN source title describes rubber wood legs.
      safe_default: true
  base:
    level: required
    shape: object
    transform: passthrough
    sources:
    - default:
        material:
        - value: Wood
          language_tag: en_US
      confidence: medium
      evidence: Current OTTOMAN source title describes rubber wood legs; Amazon base
        material enum accepts Wood.
      safe_default: true
  frame:
    level: required
    shape: object
    transform: passthrough
    sources:
    - default:
        material:
        - value: Rubberwood
          language_tag: en_US
      confidence: medium
      evidence: Current OTTOMAN source title describes rubber wood legs/frame support.
      safe_default: true
  top:
    level: required
    shape: object
    transform: passthrough
    sources:
    - default:
        material:
        - value: Linen
          language_tag: en_US
      confidence: medium
      evidence: Current OTTOMAN source material is linen upholstery.
      safe_default: true
  seat:
    level: required
    shape: object
    transform: passthrough
    children:
      height:
        shape: measure_array
        children:
          value:
            transform: passthrough
            sources:
            - path: product.dimensions.height
              confidence: high
          unit:
            sources:
            - default: inches
              confidence: high
              evidence: Product dimensions are normalized to inches.
              safe_default: true
      material_type:
        shape: list_value
        sources:
        - path: product.attributes.Main Material
          confidence: high
        - path: product.attributes.material
          confidence: high
        - default: Linen
          confidence: medium
          evidence: Current OTTOMAN source material is linen upholstery.
          safe_default: true
